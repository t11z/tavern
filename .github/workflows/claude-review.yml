name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request against the binding architectural constraints below.
            Do NOT read any files from docs/adr/ — the constraints are already embedded here.

            ## Binding Architectural Constraints

            **ADR-0001: SRD Rules Engine** (Accepted)
            - All mechanical outcomes must originate from the Rules Engine; no other component may override or reinterpret Rules Engine results.
            - SRD data must never be hardcoded in Python; all game parameters live in the database.
            - Every public function in core/ must have unit tests; PRs adding/modifying mechanics without tests are not mergeable.
            - Deterministic seed support is required for all dice operations.

            **ADR-0002: Claude as Narrator** (Accepted)
            - Claude's authority is strictly narrative; it never decides mechanical outcomes (damage, HP, spell slots, saves, initiative, conditions).
            - State snapshots are the sole input to Claude; raw state must never be exposed to the narrator directly.
            - Snapshot component order must be preserved: system prompt → character snapshot → scene context → rolling summary → current turn.
            - Claude must never output Markdown, HTML, or formatting — plain text only.

            **ADR-0003: Tech Stack** (Accepted)
            - Backend: Python 3.12+ / FastAPI only. Database: PostgreSQL 16+ only (no SQLite in production).
            - ORM: SQLAlchemy 2.x + Alembic; autogenerated migrations must always be reviewed before committing.
            - Dependency manager: uv only (no bare pip install).
            - Linter: Ruff; type checking: mypy strict mode for core/ only.

            **ADR-0004: Campaign and Session Lifecycle** (Accepted)
            - Every function modifying campaign state must use a database transaction covering Turn, CampaignState, and Character state atomically; partial writes are unacceptable.
            - campaign_id filter must be present in every query touching campaign-scoped data; no cross-campaign queries permitted.
            - CampaignState must be updated after every completed turn (autosave), never only at session end.
            - Campaign status transitions must follow the defined state machine; no implicit transitions.

            **ADR-0005: Client Architecture** (Accepted)
            - API must be headless and client-agnostic; server produces no HTML and has no knowledge of client rendering.
            - All API responses return structured JSON; narrative text is plain text without Markdown.
            - WebSocket events must be self-contained with sequence numbers; clients recover missed events via REST.

            **ADR-0006: Authentication and Authorization** (Accepted)
            - ANTHROPIC_API_KEY must never appear in API responses, database records, or client code.
            - Every API endpoint must pass through auth middleware, even when auth is disabled.
            - Campaign membership is enforced at every layer; non-members receive 403 responses.

            **ADR-0007: Multiplayer and Real-Time Communication** (Accepted)
            - Actions within a campaign are processed serially; no parallel processing or optimistic concurrency.
            - In combat, only the active player (per initiative) may submit an action.
            - WebSocket events must include monotonically increasing sequence numbers per campaign.

            ## Review Instructions

            Flag only:
            1. Changes that contradict a constraint above without a superseding ADR in this PR
            2. New architectural decisions (new dependencies, changed interfaces, new data models) that lack a corresponding ADR
            3. Logic errors or security issues

            Format your response as:
            ## ADR Compliance
            ## Issues Found
            ## Summary
          claude_args: "--max-turns 8 --model claude-sonnet-4-6"