services:
  tavern:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      5e-database:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tavern:tavern@postgres:5432/tavern}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      MONGODB_URI: ${MONGODB_URI:-mongodb://5e-database:27017/5e-database}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tavern
      POSTGRES_PASSWORD: tavern
      POSTGRES_DB: tavern
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tavern -d tavern"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  5e-database:
    image: ghcr.io/5e-bits/5e-database:v4.6.3
    volumes:
      - srd_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  discord-bot:
    # Requires DISCORD_BOT_TOKEN in .env — see .env.example for instructions.
    build: .
    command: python -m tavern.discord_bot
    depends_on:
      tavern:
        condition: service_started
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TAVERN_API_URL: http://tavern:3000
      TAVERN_WS_URL: ws://tavern:3000/ws
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  postgres_data:
  srd_data:
